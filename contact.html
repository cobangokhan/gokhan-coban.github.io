<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>İletişim</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<h1>İletişim</h1>
<p>Benimle iletişime geçebilirsiniz.<br>
  E-Posta: cobanngokhan@gmail.com<br>
  Teledon: 05469130122<br>
  GitHub: <a href="https://github.com/cobangokhan">Profilim</a><br>
  LinkedIn: <a href="https://www.linkedin.com/in/g%C3%B6khan-%C3%A7oban-a52a8619a/">Profilim</a>
</p><br>
<a href="index.html">Ana Sayfaya Dön</a>

<div class="contact-container">
    <h2>Detaylı İletişim Formu</h2>

    <form id="contactForm" onsubmit="handleSubmit(event)">

      <label for="adSoyad">Ad Soyad:</label>
      <input type="text" id="adSoyad" name="adSoyad" placeholder="Örn: Gökhan Çoban" required>

      <label for="eposta">E-posta Adresi:</label>
      <input type="email" id="eposta" name="eposta" placeholder="example@gmail.com" required>

      <label for="sifre">Başvuru Takip Şifresi:</label>
      <input type="password" id="sifre" name="sifre" placeholder="Şifrenizi girin">

      <label>İletişim Tercihi:</label>
      <div class="input-group">
        <label><input type="radio" name="iletisim" value="eposta" checked> Bana e-posta ile ulaşın.</label>
        <label><input type="radio" name="iletisim" value="telefon"> Bana telefonla ulaşın.</label>
      </div>

      <label>İlgi Alanları / Yetenekler:</label>
      <div class="input-group">
        <label><input type="checkbox" name="yetenek" value="html"> HTML</label>
        <label><input type="checkbox" name="yetenek" value="css"> CSS</label>
        <label><input type="checkbox" name="yetenek" value="algoritma"> Algoritma</label>
      </div>

      <label for="konu">Konu:</label>
      <select id="konu" name="konu" required>
        <option value="" disabled selected>Lütfen bir konu seçin...</option>
        <option value="is-teklifi">İş Teklifi</option>
        <option value="soru">Soru</option>
        <option value="geri-bildirim">Geri Bildirim</option>
      </select>

      <label for="dosya">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
      <input type="file" id="dosya" name="dosya" accept=".pdf,.doc,.docx,.jpg,.png">

      <label for="mesaj">Mesajınız:</label>
      <textarea id="mesaj" name="mesaj" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..." required></textarea>

      <div class="btn-row">
        <button type="submit" class="btn-gonder">Gönder</button>
        <button type="reset" class="btn-temizle">Temizle</button>
      </div>

      <div class="success-msg" id="successMsg">
        ✓ Mesajınız başarıyla gönderildi!
      </div>
    </form>
</div>

<script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => {
        e.target.reset();
        document.getElementById('successMsg').style.display = 'none';
      }, 3000);
    }
</script>

</body>
</html>
